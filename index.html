<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:  #1D9E75;
      --dark:   #0C1F2C;
      --sand:   #F5F2EC;
      --coal:   #D95F1A;
      --sand80: rgba(245,242,236,0.08);
    }

    html, body {
      min-height: 100%;
      background: var(--dark);
      font-family: 'DM Sans', sans-serif;
      color: var(--sand);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    /* subtle noise texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 390px;
      background: var(--dark);
      border: 1px solid rgba(29,158,117,0.18);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 32px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(29,158,117,0.08);
      animation: rise 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Header band ── */
    .card-header {
      padding: 36px 32px 28px;
      background: linear-gradient(150deg, #0f2a3a 0%, #0C1F2C 60%);
      border-bottom: 1px solid rgba(29,158,117,0.14);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 14px;
      animation: rise 0.6s 0.08s cubic-bezier(0.16,1,0.3,1) both;
    }

    .wordmark {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 28px;
      letter-spacing: -0.03em;
      color: var(--sand);
      line-height: 1;
    }

    .identity {
      animation: rise 0.6s 0.14s cubic-bezier(0.16,1,0.3,1) both;
    }

    .identity h1 {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: -0.02em;
      color: var(--sand);
      line-height: 1.15;
    }

    .identity .title {
      margin-top: 5px;
      font-size: 13px;
      font-weight: 300;
      color: var(--green);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ── Contact list ── */
    .contact-list {
      padding: 20px 32px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 0;
      border-bottom: 1px solid var(--sand80);
      text-decoration: none;
      color: var(--sand);
      transition: color 0.2s;
      animation: rise 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }

    .contact-item:nth-child(1) { animation-delay: 0.18s; }
    .contact-item:nth-child(2) { animation-delay: 0.24s; }
    .contact-item:nth-child(3) { animation-delay: 0.30s; }

    .contact-item:last-child { border-bottom: none; }

    .contact-item:hover { color: var(--green); }
    .contact-item:hover .icon-wrap { background: rgba(29,158,117,0.18); }

    .icon-wrap {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: rgba(245,242,236,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .icon-wrap svg {
      width: 17px;
      height: 17px;
      stroke: var(--green);
      fill: none;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .contact-label {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .contact-label .type {
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(245,242,236,0.35);
    }

    .contact-label .value {
      font-size: 15px;
      font-weight: 300;
    }

    /* ── Save button ── */
    .cta-wrap {
      padding: 20px 32px 28px;
      animation: rise 0.5s 0.36s cubic-bezier(0.16,1,0.3,1) both;
    }

    .save-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 24px;
      background: var(--coal);
      color: var(--sand);
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: filter 0.2s, transform 0.15s;
    }

    .save-btn:hover  { filter: brightness(1.12); transform: translateY(-1px); }
    .save-btn:active { transform: translateY(0); filter: brightness(0.95); }

    .save-btn svg {
      width: 16px;
      height: 16px;
      stroke: var(--sand);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Footer tagline ── */
    .card-footer {
      padding: 14px 32px 18px;
      border-top: 1px solid rgba(29,158,117,0.12);
      text-align: center;
      font-size: 11px;
      font-style: italic;
      font-weight: 300;
      color: rgba(245,242,236,0.3);
      letter-spacing: 0.02em;
      animation: rise 0.5s 0.42s cubic-bezier(0.16,1,0.3,1) both;
    }
  </style>
